<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email OTP Verification</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --error: #dc2626;
      --success: #16a34a;
      --border: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --bg: #f3f4f6;
    }

    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 16px;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 4px;
      color: var(--text);
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: var(--primary);
    }

    input.otp-input {
      letter-spacing: 6px;
      font-size: 20px;
      text-align: center;
      font-weight: 600;
    }

    .field {
      margin-bottom: 18px;
    }

    button {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) {
      background: var(--primary-dark);
    }

    button:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    .secondary-btn {
      background: transparent;
      color: var(--primary);
      margin-top: 10px;
      font-weight: 500;
      font-size: 13px;
      padding: 6px;
    }

    .secondary-btn:hover:not(:disabled) {
      background: transparent;
      text-decoration: underline;
    }

    .message {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .message.error {
      background: #fef2f2;
      color: var(--error);
      border: 1px solid #fecaca;
      display: block;
    }

    .message.success {
      background: #f0fdf4;
      color: var(--success);
      border: 1px solid #bbf7d0;
      display: block;
    }

    .message.info {
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      display: block;
    }

    .hidden {
      display: none;
    }

    .verified-icon {
      text-align: center;
      font-size: 48px;
      margin-bottom: 8px;
    }

    .step-email-display {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .step-email-display strong {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- STEP 1: Enter email -->
    <div id="step-email">
      <h1>Verify your email</h1>
      <p class="subtitle">Enter your email and we'll send you a verification code.</p>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <button id="sendOtpBtn">Send OTP</button>
      <div id="emailMessage" class="message"></div>
    </div>

    <!-- STEP 2: Enter OTP -->
    <div id="step-otp" class="hidden">
      <h1>Enter verification code</h1>
      <p class="step-email-display">
        We sent a 6-digit code to <strong id="emailDisplay"></strong>
      </p>

      <div class="field">
        <label for="otp">Verification code</label>
        <input type="text" id="otp" class="otp-input" placeholder="------" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
      </div>

      <button id="verifyOtpBtn">Verify</button>
      <button id="resendOtpBtn" class="secondary-btn" type="button">Resend code</button>
      <div id="otpMessage" class="message"></div>
    </div>

    <!-- STEP 3: Success -->
    <div id="step-success" class="hidden">
      <div class="verified-icon">✅</div>
      <h1>Email verified!</h1>
      <p class="subtitle">Your email address has been successfully verified.</p>
      <button id="restartBtn" type="button">Verify another email</button>
    </div>

  </div>

  <script>
    // Change this if your backend runs on a different host/port
    const API_BASE_URL = window.location.origin + '/api';

    const stepEmail = document.getElementById('step-email');
    const stepOtp = document.getElementById('step-otp');
    const stepSuccess = document.getElementById('step-success');

    const emailInput = document.getElementById('email');
    const otpInput = document.getElementById('otp');
    const emailDisplay = document.getElementById('emailDisplay');

    const sendOtpBtn = document.getElementById('sendOtpBtn');
    const verifyOtpBtn = document.getElementById('verifyOtpBtn');
    const resendOtpBtn = document.getElementById('resendOtpBtn');
    const restartBtn = document.getElementById('restartBtn');

    const emailMessage = document.getElementById('emailMessage');
    const otpMessage = document.getElementById('otpMessage');

    let currentEmail = '';

    function showMessage(el, text, type) {
      el.textContent = text;
      el.className = 'message ' + type;
    }

    function clearMessage(el) {
      el.textContent = '';
      el.className = 'message';
    }

    function setLoading(btn, loading, defaultText) {
      btn.disabled = loading;
      btn.textContent = loading ? 'Please wait...' : defaultText;
    }

    async function sendOtp() {
      const email = emailInput.value.trim();

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showMessage(emailMessage, 'Please enter a valid email address.', 'error');
        return;
      }

      clearMessage(emailMessage);
      setLoading(sendOtpBtn, true, 'Send OTP');

      try {
        const res = await fetch(`${API_BASE_URL}/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        const data = await res.json();

        if (data.success) {
          currentEmail = email;
          emailDisplay.textContent = email;
          stepEmail.classList.add('hidden');
          stepOtp.classList.remove('hidden');
          otpInput.value = '';
          clearMessage(otpMessage);
          otpInput.focus();
        } else {
          showMessage(emailMessage, data.message || 'Failed to send OTP.', 'error');
        }
      } catch (err) {
        showMessage(emailMessage, 'Network error. Please try again.', 'error');
      } finally {
        setLoading(sendOtpBtn, false, 'Send OTP');
      }
    }

    async function verifyOtp() {
      const otp = otpInput.value.trim();

      if (!otp || otp.length !== 6) {
        showMessage(otpMessage, 'Please enter the 6-digit code.', 'error');
        return;
      }

      clearMessage(otpMessage);
      setLoading(verifyOtpBtn, true, 'Verify');

      try {
        const res = await fetch(`${API_BASE_URL}/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail, otp }),
        });

        const data = await res.json();

        if (data.success) {
          stepOtp.classList.add('hidden');
          stepSuccess.classList.remove('hidden');
        } else {
          showMessage(otpMessage, data.message || 'Verification failed.', 'error');
        }
      } catch (err) {
        showMessage(otpMessage, 'Network error. Please try again.', 'error');
      } finally {
        setLoading(verifyOtpBtn, false, 'Verify');
      }
    }

    async function resendOtp() {
      clearMessage(otpMessage);
      setLoading(resendOtpBtn, true, 'Resend code');

      try {
        const res = await fetch(`${API_BASE_URL}/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail }),
        });

        const data = await res.json();

        if (data.success) {
          showMessage(otpMessage, 'A new code has been sent.', 'info');
        } else {
          showMessage(otpMessage, data.message || 'Failed to resend OTP.', 'error');
        }
      } catch (err) {
        showMessage(otpMessage, 'Network error. Please try again.', 'error');
      } finally {
        setLoading(resendOtpBtn, false, 'Resend code');
      }
    }

    function restart() {
      currentEmail = '';
      emailInput.value = '';
      otpInput.value = '';
      clearMessage(emailMessage);
      clearMessage(otpMessage);
      stepSuccess.classList.add('hidden');
      stepOtp.classList.add('hidden');
      stepEmail.classList.remove('hidden');
      emailInput.focus();
    }

    sendOtpBtn.addEventListener('click', sendOtp);
    verifyOtpBtn.addEventListener('click', verifyOtp);
    resendOtpBtn.addEventListener('click', resendOtp);
    restartBtn.addEventListener('click', restart);

    // Allow Enter key to submit
    emailInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendOtp();
    });
    otpInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') verifyOtp();
    });

    // Restrict OTP input to digits only
    otpInput.addEventListener('input', () => {
      otpInput.value = otpInput.value.replace(/\D/g, '');
    });
  </script>
</body>
</html>
